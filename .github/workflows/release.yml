name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc:latest
      options: --privileged

    steps:
      - name: Install libstdc++ for Actions runner
        run: xbps-install -Sy gcc-libs

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          xbps-install -Syu xbps
          xbps-install -Sy xtools-minimal dosfstools e2fsprogs util-linux qemu-img openssl

      - name: Build avoid.img.gz
        run: ./build_img_gz.sh

      - name: Build avoid.qcow2
        run: ./build_qcow2.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            avoid.img.gz
            avoid.qcow2
